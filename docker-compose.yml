version: '3.9'

services:
  redis:
    image: redis:latest

    container_name: tailr-redis

    restart: unless-stopped

    ports:
      - '${REDIS_PORT}:6379'

    volumes:
      - redis-data:/data

  ollama:
    image: ollama/ollama:latest

    container_name: tailr-ollama

    restart: unless-stopped

    ports:
      - '${OLLAMA_PORT}:11434'

    volumes:
      - ollama-data:/root/.ollama

volumes:
  redis-data:

  ollama-data:
